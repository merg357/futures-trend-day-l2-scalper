# MES execution / ES signal / NQ confirmation raw test (sim only — filters off).
# Orders route ONLY to MES via NT8; ES book drives flow_burst; NQ vetoes only.
mode: MES_ES_NQ_RAW_TEST
symbol: MES
instrument_family: ES
tick_size: 0.25
tick_value: 1.25
point_value: 5.0
contract_multiplier: 5.0
routing:
  execution_instrument: MES
  signal_instrument: ES
  confirmation_instrument: NQ
filters:
  use_session_filter: false
  use_time_filter: false
  use_news_filter: false
  use_daily_loss_limit: false
  use_trade_cap: false
  use_cooldown: false
  use_take_profit: false
  use_max_hold_time: false
  use_signal_flip_exit: false
nq_confirmation:
  use_nq_confirmation: true
  nq_veto_threshold: 55.0
  nq_opposing_flow_veto: 65.0
  nq_obi_veto_threshold: 0.65
  nq_veto_min_flow_for_obi: 55.0
mes_execution:
  max_spread_ticks: 4
  entry_chase_ticks: 1
  entry_timeout_ms: 1500
  quote_max_age_sec: 5.0
  order_id_prefix: L2MES
  submit_hard_stop_on_fill: true
  entry_order_mode: MARKETABLE_LIMIT
  resample_mes_quote_before_submit: true
  block_on_fill_divergence: false
  log_fill_divergence: true
raw_test_runtime:
  decision_loop_ms: 250
  order_monitor_loop_ms: 250
  exit_monitor_loop_ms: 250
  dashboard_refresh_ms: 2000
session:
  timezone: America/New_York
  rth_open: '09:30'
  rth_close: '16:00'
  flatten_before_close_minutes: 5
trend:
  ema_fast: 9
  ema_slow: 21
  ema_trend: 50
  vwap_enabled: true
  adx_period: 14
  adx_trend_min: 22.0
  atr_period: 14
  atr_expansion_mult: 1.1
  use_trend_filter: false
  require_trend_alignment: false
  min_trend_score: 0
  weight_ema: 25.0
  weight_vwap: 20.0
  weight_adx: 25.0
  weight_atr: 15.0
  weight_structure: 15.0
l2:
  min_l2_score: 28
  imbalance_threshold: 0.55
  depth_levels: 5
  min_book_depth: 12.0
  spoof_filter_enabled: false
  weight_imbalance: 35.0
  weight_depth: 25.0
  weight_delta: 25.0
  weight_absorption: 15.0
  approximation_when_missing: true
flow:
  min_flow_score: 50
  flow_strong_score: 70
  relaxed_min_trend_score: 35
  min_triggers: 2
  short_delta_max: -8
  long_delta_min: 6
  strong_delta_magnitude: 15
  imbalance_threshold: 0.55
  book_size_ratio: 2.0
  use_mbo_new_counts: true
  min_depth_event_rate_per_min: 0
  ask_shrink_min_drop: 0.15
  depth_spike_ratio: 1.25
  weight_delta: 40.0
  weight_imbalance: 30.0
  weight_book_change: 30.0
entry:
  chop_filter_enabled: false
  chop_adx_max: 18.0
  chop_range_atr_mult: 0.25
  pullback_to_ema_ticks: 3
  max_spread_ticks: 4
  require_l2_confirmation: false
  use_flow_signals: true
  flow_burst_mode: true
  flow_burst_poll_sec: 15
  flow_burst_cooldown_sec: 30
  use_burst_cooldown: false
  use_one_entry_per_minute: false
  use_per_minute_dedup: false
  min_seconds_between_entries: 0
  orderflow_poll_sec: 10
  orderflow_max_age_sec: 45
  entry_cancel_timeout_sec: 1.5
  use_adverse_mid_cancel: true
  entry_adverse_mid_ticks: 12
  pullback_required_for_burst: false
  pullback_mode: false
  min_bars_after_open: 0
  cooldown_bars_after_exit: 0
  rth_only: false
exit:
  stop_loss_ticks: 10
  take_profit_ticks: 0
  breakeven_enabled: true
  breakeven_trigger_ticks: 8
  breakeven_offset_ticks: 1
  trailing_enabled: true
  trailing_trigger_ticks: 8
  trailing_offset_ticks: 8
  trailing_step_ticks: 1
  max_hold_bars: 0
  l2_reversal_exit_enabled: false
  l2_reversal_threshold: 35.0
  exit_at_session_end: false
risk:
  max_contracts: 1
  max_trades_per_session: 0
  max_daily_loss_dollars: 0
  risk_per_trade_dollars: 50.0
  max_consecutive_losses: 0
backtest:
  slippage_ticks: 1
  commission_per_side: 0.62
  initial_capital: 10000.0
  bar_interval_seconds: 60
optimize:
  n_trials_default: 50
  metric: net_pnl
  min_trades: 3
