# Production paper-trading config — copy of walk-forward validated params.
# Source: configs/mnq_walkforward_optimized.yaml
# Holdout validation: data/reports/recommended_tests/RECOMMENDED_TESTS_REPORT.md
symbol: MNQ
instrument_family: NQ
tick_size: 0.25
tick_value: 0.5
point_value: 2.0
contract_multiplier: 2.0
session:
  timezone: America/New_York
  rth_open: 09:30
  rth_close: '16:00'
  flatten_before_close_minutes: 5
trend:
  ema_fast: 9
  ema_slow: 21
  ema_trend: 50
  vwap_enabled: true
  adx_period: 14
  adx_trend_min: 22.0
  atr_period: 14
  atr_expansion_mult: 1.1
  min_trend_score: 40
  weight_ema: 25.0
  weight_vwap: 20.0
  weight_adx: 25.0
  weight_atr: 15.0
  weight_structure: 15.0
l2:
  # Composite L2 gate; flow signals can bypass when use_flow_signals=true
  min_l2_score: 28
  imbalance_threshold: 0.55
  depth_levels: 5
  # Research: bridge L0 often 1-12 contracts; was 50 (depth score stuck at 30)
  min_book_depth: 12.0
  spoof_filter_enabled: true
  weight_imbalance: 35.0
  weight_depth: 25.0
  weight_delta: 25.0
  weight_absorption: 15.0
  approximation_when_missing: true
flow:
  # Circled-move thresholds from reports/l2_mbo_circled_moves_research_latest.md
  min_flow_score: 50
  flow_strong_score: 70
  relaxed_min_trend_score: 35
  min_triggers: 2
  short_delta_max: -8        # Move 2 sell burst trade_delta -20; gate at -8
  long_delta_min: 6          # Rally legs +6 to +19 on parquet/CSV delta
  strong_delta_magnitude: 15 # Alt depth-burst: +20 @ 20:00 ET rally open
  imbalance_threshold: 0.55  # L0 imb ±1.0 on drops/reversals in research
  book_size_ratio: 2.0       # ask>>bid @ 11:18 drop (MBO 6.6x proxy on L0)
  use_mbo_new_counts: true   # prefer mbo_ask_new_count/mbo_bid_new_count from orderflow.json
  min_depth_event_rate_per_min: 0  # optional depth churn gate (0=off)
  ask_shrink_min_drop: 0.15  # ask_book shrink proxy vs prior bar
  depth_spike_ratio: 1.25    # bid_depth+ask_depth burst vs prior (evening ~10k events/min)
  weight_delta: 40.0
  weight_imbalance: 30.0
  weight_book_change: 30.0
entry:
  chop_filter_enabled: true
  chop_adx_max: 18.0
  chop_range_atr_mult: 0.25
  pullback_to_ema_ticks: 3
  max_spread_ticks: 6
  require_l2_confirmation: true
  use_flow_signals: true
  # Momentum burst entries inside the minute (research: circled moves were not EMA pullbacks).
  flow_burst_mode: true
  flow_burst_poll_sec: 15
  flow_burst_cooldown_sec: 30
  orderflow_poll_sec: 10
  orderflow_max_age_sec: 45
  pullback_required_for_burst: false
  pullback_mode: false
  min_bars_after_open: 0
  cooldown_bars_after_exit: 0
  rth_only: false
exit:
  stop_loss_ticks: 30
  take_profit_ticks: 200
  breakeven_enabled: true
  breakeven_trigger_ticks: 15
  breakeven_offset_ticks: 1
  trailing_enabled: true
  trailing_trigger_ticks: 15
  trailing_offset_ticks: 5
  max_hold_bars: 0  # 0 = disabled
  l2_reversal_exit_enabled: true
  l2_reversal_threshold: 35.0
  exit_at_session_end: false
risk:
  max_contracts: 1
  max_trades_per_session: 0  # 0 = disabled
  max_daily_loss_dollars: 0  # 0 = disabled
  risk_per_trade_dollars: 40.0
  max_consecutive_losses: 0  # 0 = disabled
backtest:
  slippage_ticks: 1
  commission_per_side: 0.62
  initial_capital: 10000.0
  bar_interval_seconds: 60
optimize:
  n_trials_default: 50
  metric: net_pnl
  min_trades: 3
